    class CompetencyAnalyzer {
      constructor(containerId) {
        this.container = document.getElementById(containerId);
        this.STORAGE_KEY = 'comp_grade_save_v18_masterpiece';

      getInitialState() {
        return {
          step: 'START', currentQuestionIndex: 0, userName: "", scores: { B: 0, E: 0, S: 0, I: 0, M: 0, L: 0 },
          answerHistory: [], pctScores: {}, ranking: [], gradeMatches: [], bestGrade: null, nextGrade: null, careerType: null
        };

      init() { this.render(); }
      hasSavedData() { try { return localStorage.getItem(this.STORAGE_KEY) !== null; } catch(e) { return false; } }
      saveProgress() { try { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(this.state)); } catch (e) { } }
      loadProgress() { try { const saved = localStorage.getItem(this.STORAGE_KEY); if (saved) { this.state = JSON.parse(saved); this.render(); } } catch (e) { } }
      clearProgress() { try { localStorage.removeItem(this.STORAGE_KEY); } catch(e) {} }

      handleStart() {
        this.state = this.getInitialState(); 
        const inputElement = document.getElementById('user-name');
        if (inputElement) {
          const rawVal = inputElement.value.trim();
          if (rawVal.length > 20) { alert("エラー：お名前は20文字以内で入力してください。"); return; }
          this.state.userName = rawVal ? rawVal : "Guest"; 
        }
        this.state.step = 'QUESTION';
        this.saveProgress();
        this.render();
      }

      handleAnswer(optionScores) {
        if (!optionScores) return;
        this.state.answerHistory.push(optionScores);
        for (let key in optionScores) { if (this.state.scores[key] !== undefined) { this.state.scores[key] += optionScores[key]; } }
        if (this.state.currentQuestionIndex + 1 < QUESTIONS.length) {
          this.state.currentQuestionIndex++; this.saveProgress(); this.render();
        } else {
          this.calculateResult(); this.clearProgress(); this.state.step = 'RESULT'; this.render();
        }
      }

      goBack() {
        if (this.state.currentQuestionIndex > 0) {
          const lastScores = this.state.answerHistory.pop();
          if (lastScores) { for (let key in lastScores) { if (this.state.scores[key] !== undefined) { this.state.scores[key] -= lastScores[key]; } } }
          this.state.currentQuestionIndex--; this.saveProgress(); this.render();
        }
      }

      calculateResult() {
        let maxScores = { B: 0, E: 0, S: 0, I: 0, M: 0, L: 0 };
        QUESTIONS.forEach(q => {
          let qMax = { B: 0, E: 0, S: 0, I: 0, M: 0, L: 0 };
          q.options.forEach(opt => { for (let key in opt.scores) { if (opt.scores[key] > qMax[key]) qMax[key] = opt.scores[key]; } });
          for (let key in qMax) maxScores[key] += qMax[key];
        });

        let pctScores = {};
        for (let key in this.state.scores) {
          pctScores[key] = maxScores[key] > 0 ? Math.min(100, Math.round((this.state.scores[key] / maxScores[key]) * 100)) : 0;
        }
        this.state.pctScores = pctScores;

        let dimList = Object.keys(pctScores).map(k => ({ key: k, score: pctScores[k] }));
        dimList.sort((a, b) => b.score - a.score);
        this.state.ranking = dimList;

        let rawMatches = [];
        GRADE_REQUIREMENTS.forEach(grade => {
          let isClear = true;
          let missingDetails = [];
          let reqTotal = 0, userTotal = 0;
          for (let key in grade.req) {
            let req = grade.req[key];
            if (req > 0) {
              reqTotal += req;
              userTotal += Math.min(pctScores[key], req);
              if (pctScores[key] < req) {
                isClear = false;
                // ★差分と難易度（diff）からコストを計算して保持
                let gap = req - pctScores[key];
                let cost = gap * DIMENSIONS[key].diff;
                missingDetails.push({ label: DIMENSIONS[key].label, gap: gap, diff: DIMENSIONS[key].diff, cost: cost });
              }
            }
          }
          let matchPct = reqTotal > 0 ? Math.round((userTotal / reqTotal) * 100) : 100;
          rawMatches.push({ ...grade, matchPct, isClear, missingDetails });
        });

        let matches = [];
        let gMatches = rawMatches.filter(m => m.type === 'G');
        let currentMaxG = 100;
        gMatches.forEach(m => { m.matchPct = Math.min(m.matchPct, currentMaxG); currentMaxG = m.matchPct; matches.push(m); });

        let sMatches = rawMatches.filter(m => m.type === 'S');
        let currentMaxS = 100;
        sMatches.forEach(m => { m.matchPct = Math.min(m.matchPct, currentMaxS); currentMaxS = m.matchPct; matches.push(m); });

        this.state.gradeMatches = rawMatches.map(rm => matches.find(m => m.id === rm.id));

        const gList = this.state.gradeMatches.filter(m => m.type === 'G').reverse();
        const sList = this.state.gradeMatches.filter(m => m.type === 'S').reverse();

        let clearedG = gList.find(g => g.isClear);
        let clearedS = sList.find(s => s.isClear);
        let bestG = clearedG || this.state.gradeMatches.find(m => m.id === 'G1');

        // ★2Dベクトル解析による「重心ベクトル」志向性判定
        // V_M (Management Vector) = sqrt(M^2 + L^2)
        // V_S (Specialist Vector) = sqrt(S^2 + I^2)
        let magM = Math.sqrt(Math.pow(pctScores.M, 2) + Math.pow(pctScores.L, 2));
        let magS = Math.sqrt(Math.pow(pctScores.S, 2) + Math.pow(pctScores.I, 2));
        // マージン5%を持たせ、専門性が明らかに突き抜けている場合のみSpecialistとする
        let isSpecialist = magS > (magM * 1.05); 
        let careerType = isSpecialist ? '専門職ライン (SP/EX/F系列) 重心' : 'マネジメントライン (G系列) 重心';

        let bestGrade = bestG;
        let nextGrade = null;

        if (isSpecialist) {
            if (clearedS) {
                bestGrade = clearedS;
                let originalIndex = this.state.gradeMatches.findIndex(m => m.id === bestGrade.id);
                nextGrade = this.state.gradeMatches.slice(originalIndex + 1).find(m => m.type === 'S');
            } else {
                bestGrade = bestG;
                nextGrade = this.state.gradeMatches.find(m => m.id === 'SP');
            }
        } else {
            bestGrade = bestG;
            let originalIndex = this.state.gradeMatches.findIndex(m => m.id === bestGrade.id);
            nextGrade = this.state.gradeMatches.slice(originalIndex + 1).find(m => m.type === 'G');
        }

        this.state.bestGrade = bestGrade;
        this.state.nextGrade = nextGrade;
        this.state.careerType = careerType;
      }

        if (!this.container) return;
        try {
          this.container.innerHTML = '';
          if (this.state.step === 'RESULT') {
            document.body.className = "bg-slate-50 text-slate-800 antialiased print:bg-white print:text-slate-800";
          } else {
            document.body.className = "bg-slate-950 text-slate-200 antialiased print:bg-white print:text-slate-800";
          }

          if (this.state.step === 'START') {
            this.container.innerHTML = this.getStartHtml(); this.attachStartListeners();
          } else if (this.state.step === 'QUESTION') {
            this.container.innerHTML = this.getQuestionHtml(); this.attachQuestionListeners();
          } else if (this.state.step === 'RESULT') {
            this.container.innerHTML = this.getResultHtml(); this.attachResultListeners();
          }
        } catch(err) {
          this.container.innerHTML = `<div class="p-8 border-2 border-red-500 bg-red-900 text-white rounded-lg">システムエラーが発生しました: ${escapeHtml(err.message)}</div>`;
        }
      }

        const backBtn = document.getElementById('back-btn'); if (backBtn) backBtn.onclick = (e) => { e.preventDefault(); e.stopPropagation(); this.goBack(); };
        const qTitle = document.getElementById(`question-title-${this.state.currentQuestionIndex}`); if (qTitle) { qTitle.tabIndex = -1; qTitle.focus(); }
      }

        const restartBtn = document.getElementById('restart-btn');
        if (restartBtn) restartBtn.onclick = (e) => { e.preventDefault(); this.state = this.getInitialState(); this.render(); };
        setTimeout(() => { this.renderCharts(); }, 10);
      }

      getStartHtml() {
        const hasSave = this.hasSavedData();
        return `
          <section class="fade-in flex items-center justify-center p-4 w-full h-full">
            <div class="bg-slate-900 rounded-lg shadow-2xl p-8 md:p-12 max-w-2xl w-full border border-slate-800">
              <h1 class="text-2xl md:text-3xl font-bold text-white mb-4 text-center tracking-wide">
                Competency Grade Analyzer
              </h1>
              <p class="text-center text-amber-400 text-sm font-bold tracking-widest mb-8">自己経営OS・戦略マップ生成モデル</p>
              <div class="border-b border-amber-600 w-full mb-8"></div>
              
              <div class="mb-6">
                <label class="block text-amber-400 text-xs font-bold mb-2 uppercase tracking-wide" for="user-name">NAME / 受検者氏名</label>
                <input type="text" id="user-name" autocomplete="off" placeholder="氏名を入力してください（未入力はGuest）" class="appearance-none bg-slate-800 border border-slate-700 rounded w-full py-3 px-4 text-slate-200 leading-tight focus:outline-none focus:ring-2 focus:ring-amber-500">
              </div>

              <div class="bg-slate-800/50 border-l-4 border-amber-500 rounded p-6 mb-8 text-sm text-slate-300">
                <h2 class="text-amber-400 font-bold mb-4 text-base flex items-center">
                  <span class="w-2 h-2 bg-amber-400 mr-2"></span> Assessment Methodology
                </h2>
                <p class="mb-3 text-slate-300">本システムは「平均点」での甘い判定を行いません。全90問の「行動実績ファクト」に基づき、該当グレードの<strong>【必須クリア条件（足切り）】</strong>を厳格に判定します。<br>さらに2Dベクトル解析と到達難易度アルゴリズムを用い、成長のための<strong>「最短経路（戦略マップ）」</strong>を算出します。</p>
                <ul class="space-y-1 mb-5 pl-2 text-xs">
                  <li>・<strong>Basic Stance:</strong> 基礎姿勢・誠実性・規律</li>
                  <li>・<strong>Execution:</strong> 業務遂行力・目標達成・改善</li>
                  <li>・<strong>Specialty:</strong> 専門性・利益創出・顧客志向</li>
                  <li>・<strong>Innovation:</strong> 企画提案・変革力・戦略策定</li>
                  <li>・<strong>Management:</strong> 計画進捗管理・人材育成・組織運営</li>
                  <li>・<strong>Leadership:</strong> ビジョン策定・決断・影響力・信念</li>
                </ul>
              </div>

              <div class="text-center mt-8 flex flex-col items-center space-y-4">
                <button type="button" id="start-btn" class="w-full sm:w-auto bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 px-10 rounded transition-colors text-sm tracking-wide focus:outline-none">
                  アセスメントを開始する (全90問)
                </button>
                ${hasSave ? `<button type="button" id="load-btn" class="w-full sm:w-auto text-slate-400 hover:text-white underline text-sm transition-colors focus:outline-none">前回の続きから再開する</button>` : ''}
              </div>
            </div>
          </section>
        `;
      }

      getQuestionHtml() {
        const qIndex = this.state.currentQuestionIndex;
        const currentQ = QUESTIONS[qIndex];
        const progress = ((qIndex) / QUESTIONS.length) * 100;

        const optionsHtml = currentQ.options.map((opt, idx) => `
          <button type="button" class="option-btn w-full text-left p-5 border border-slate-700 bg-slate-900 rounded hover:border-amber-500 hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all font-medium text-slate-300 text-sm md:text-base cursor-pointer" aria-describedby="question-title-${qIndex}">
            ${escapeHtml(opt.text)}
          </button>
        `).join('');

        const backBtnHtml = qIndex > 0 
          ? `<button type="button" id="back-btn" class="text-slate-500 hover:text-amber-400 text-sm flex items-center transition-colors focus:outline-none">
              <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> 前に戻る
             </button>` : `<div></div>`;

        return `
          <section class="fade-in max-w-2xl w-full mx-auto p-4 pt-8 md:pt-12" aria-labelledby="question-title-${qIndex}">
            <div class="w-full bg-slate-800 h-2 mb-8 rounded-full overflow-hidden">
              <div class="bg-amber-500 h-full transition-all duration-300" style="width: ${progress}%"></div>
            </div>
            <div class="bg-slate-900 rounded-lg shadow-xl p-6 md:p-10 border border-slate-800">
              <div class="flex items-center justify-between mb-6">
                <span class="bg-slate-800 text-amber-400 text-xs px-3 py-1 rounded border border-slate-700">Q${qIndex + 1}. ${escapeHtml(currentQ.theme)}</span>
                <span class="text-slate-500 text-xs font-mono font-bold">${qIndex + 1} / ${QUESTIONS.length}</span>
              </div>
              <h2 id="question-title-${qIndex}" class="text-lg md:text-xl font-bold text-white mb-8 leading-relaxed focus:outline-none">${escapeHtml(currentQ.text)}</h2>
              <div class="space-y-3 flex flex-col">${optionsHtml}</div>
              <div class="mt-8 pt-4 border-t border-slate-800 flex justify-between items-center">${backBtnHtml}</div>
            </div>
          </section>
        `;
      }

      getResultHtml() {
        const { pctScores, bestGrade, nextGrade, careerType, ranking } = this.state;
        const today = new Date();
        const dateStr = `${today.getFullYear()}/${String(today.getMonth() + 1).padStart(2, '0')}/${String(today.getDate()).padStart(2, '0')}`;

        const top1 = DIMENSIONS[ranking[0].key];

        // ★ギャップ・インジケーター（最短経路の算出と可視化）
        let missingReqHtml = '<span class="text-slate-500 text-[11px] font-bold">全ての必須要件をクリアしています。</span>';
        if (nextGrade && nextGrade.missingDetails && nextGrade.missingDetails.length > 0) {
            // コスト（Gap * Difficulty）の小さい順にソートし、「最も労力対効果が高いもの」を最短経路とする
            nextGrade.missingDetails.sort((a, b) => a.cost - b.cost);

            missingReqHtml = '<div class="grid grid-cols-2 gap-2 mt-1">';
            nextGrade.missingDetails.forEach((item, idx) => {
                // 最もコストが低いものにバッジをつける
                let badge = idx === 0 ? `<span class="bg-rose-500 text-white text-[8px] print:text-[7px] px-1 py-0.5 rounded ml-1 leading-none shadow-sm font-normal">最短経路</span>` : '';
                let borderClass = idx === 0 ? 'border-rose-400 bg-rose-50' : 'border-slate-200 bg-white';
                
                missingReqHtml += `
                    <div class="flex justify-between items-center ${borderClass} px-2 py-1 rounded shadow-sm">
                        <span class="text-[10px] print:text-[8.5px] font-bold text-slate-700 flex items-center whitespace-nowrap overflow-hidden text-ellipsis mr-1">${escapeHtml(item.label.split('・')[0])}${badge}</span>
                        <span class="text-[11px] print:text-[10px] font-black text-rose-600">+${item.gap}%</span>
                    </div>
                `;
            });
            missingReqHtml += '</div>';
        }

        const targetId = nextGrade ? nextGrade.id : bestGrade.id;
        const paradigm = PARADIGM_SHIFTS[targetId] || { unlearn: "既存の思考の枠組み", acquire: "新たな価値基準の創出" };
        
        const bestArchetype = GRADE_ARCHETYPES[bestGrade.id] || '能力発展型';
        const nextArchetype = nextGrade ? (GRADE_ARCHETYPES[nextGrade.id] || '上位発展型') : '最高到達点';

        return `
          <section class="fade-in max-w-[1000px] mx-auto p-4 md:py-8 w-full print:max-w-none print:w-full print:p-0 print:m-0">
            <div class="bg-white p-8 md:p-10 print:p-6 border border-slate-200 print:border-none rounded shadow-sm print:shadow-none print:h-full flex flex-col">
              
              <div class="flex flex-col md:flex-row print:flex-row border-b border-slate-200 pb-6 mb-4 print:pb-3 print:mb-3 gap-8 print:gap-6">
                
                <div class="flex flex-col md:w-5/12 print:w-5/12 justify-center relative">
                  <div class="absolute top-0 left-0 text-left w-full flex justify-between items-start">
                    <div>
                      <p class="text-amber-600 text-[10px] font-mono tracking-widest">${dateStr}</p>
                      <p class="text-slate-900 text-sm font-bold mt-1 display-user-name"></p>
                    </div>
                    <div class="text-right">
                      <p class="text-[8px] text-slate-400 font-mono">VECTOR ANALYSIS</p>
                      <p class="text-[10px] font-bold text-slate-600">${escapeHtml(careerType)}</p>
                    </div>
                  </div>
                  
                  <div class="mt-12 print:mt-10">
                    <p class="text-[10px] text-slate-500 font-bold tracking-[0.2em] mb-1">BEHAVIORAL ARCHETYPE</p>
                    <h2 class="text-3xl print:text-2xl font-black text-slate-900 tracking-tight">${escapeHtml(bestGrade.id)} <span class="text-xl print:text-lg text-amber-600 ml-1">「${escapeHtml(bestArchetype)}」</span></h2>
                    <p class="text-sm print:text-xs text-slate-500 font-bold mt-1">${escapeHtml(bestGrade.name.replace(bestGrade.id + ' ', ''))} / 実績ファクト到達判定</p>
                  </div>

                  <div class="mt-4 bg-slate-50 border border-slate-200 p-4 print:p-3 rounded text-[13px] print:text-[10.5px] text-slate-700 space-y-3.5 print:space-y-3 page-break-inside-avoid leading-relaxed">
                    
                    <div>
                        <div class="font-bold text-amber-700 mb-1">■ 1. 判定ロジックと重心ベクトル</div>
                        <p>本システムは「平均点」ではなく、<strong>「該当グレードが要求する全領域の必須条件（最低基準）をすべて突破しているか」</strong>という厳格な階層ロジックで判定しています。また、6次元の重心ベクトル解析（|V_S| vs |V_M|）の結果、あなたのポテンシャルは<strong>${escapeHtml(careerType.split(' ')[0])}</strong>の空間に強く傾いています。</p>
                    </div>

                    <div class="border-t border-slate-200 pt-3 print:pt-2">
                        <div class="font-bold text-slate-800 mb-1">■ 2. あなたの最大の武器（コア特性）</div>
                        <p>あなたの最大の武器は<strong>「${escapeHtml(top1.label)}」</strong>です。これが現在の成果の源泉であり、他者に対する影響力の基盤となっています。人は弱点の克服ではなく、強みの最大化によってのみ卓越した成果を出せます。この武器をさらに研ぎ澄ましてください。</p>
                    </div>

                    ${nextGrade ? `
                    <div class="border-t border-slate-200 pt-3 print:pt-2">
                        <div class="font-bold text-slate-800 mb-1">■ 3. ${escapeHtml(nextGrade.id)}（${escapeHtml(nextArchetype)}）への戦略マップ</div>
                        <p class="mb-1">次期要件を満たすため、各項目の「到達難易度」と「スコア差分」から割り出した<strong>【最短距離での克服アクション】</strong>は以下の通りです。</p>
                        ${missingReqHtml}
                        <p class="mt-2 mb-1">これらのギャップを埋めるためには、単なる作業時間の投下ではなく、以下の明確な<strong>「思考転換（パラダイムシフト）」</strong>が必須となります。</p>
                        <div class="flex flex-col gap-1 text-[12px] print:text-[9.5px] font-medium bg-white p-2 border border-slate-100 rounded mt-1 shadow-sm">
                            <p><span class="inline-block bg-slate-200 text-slate-600 px-2 py-0.5 rounded text-[9px] mr-1 font-bold">手放す</span> ${escapeHtml(paradigm.unlearn)}</p>
                            <p><span class="inline-block bg-amber-100 text-amber-700 px-2 py-0.5 rounded text-[9px] mr-1 font-bold">獲得する</span> ${escapeHtml(paradigm.acquire)}</p>
                        </div>
                    </div>` : ''}

                  </div>
                </div>

                <div class="flex flex-col md:w-7/12 print:w-7/12 justify-center gap-5 print:gap-4">
                  <div class="w-full bg-slate-50 border border-slate-200 rounded-lg p-4 print:p-3 flex flex-col justify-center items-center shadow-sm">
                    <h3 class="text-center font-bold text-slate-800 text-sm print:text-[11px] tracking-wide mb-2 print:mb-1 w-full">コンピテンシー 6次元バランス</h3>
                    <div class="relative h-[210px] print:h-[190px] w-full">
                      <canvas id="radarChart"></canvas>
                    </div>
                  </div>
                  
                  <div class="w-full bg-slate-50 border border-slate-200 rounded-lg p-4 print:p-3 flex flex-col justify-center items-center shadow-sm">
                    <h3 class="text-center font-bold text-slate-800 text-sm print:text-[11px] tracking-wide mb-2 print:mb-1 w-full">各グレードへの必須要件到達率 (%)</h3>
                    <div class="relative h-[170px] print:h-[140px] w-full">
                      <canvas id="barChart"></canvas>
                    </div>
                  </div>
                </div>

              </div>

              <div class="mt-2 text-center flex justify-center gap-4 print:hidden">
                <button type="button" onclick="window.print()" class="bg-amber-600 hover:bg-amber-500 text-white font-bold py-2 px-6 rounded shadow-md text-sm focus:outline-none">PDF保存・印刷</button>
                <button type="button" id="restart-btn" class="bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-2 px-6 rounded shadow-md text-sm focus:outline-none">再診断を行う</button>
              </div>
              
            </div>
          </section>
        `;
      }

      renderCharts() {
        if (typeof Chart === 'undefined') return;

        const ex1 = Chart.getChart("radarChart"); if(ex1) ex1.destroy();
        const ex2 = Chart.getChart("barChart");   if(ex2) ex2.destroy();

        const { pctScores, gradeMatches } = this.state;
        const radarColor = { bg: "rgba(245, 158, 11, 0.15)", border: "rgba(245, 158, 11, 1)", point: "rgba(245, 158, 11, 1)" };

        const ctxRadar = document.getElementById('radarChart');
        if (ctxRadar) {
          new Chart(ctxRadar.getContext('2d'), {
            type: 'radar',
            data: {
              labels: [['Basic Stance','(基礎姿勢)'], ['Execution','(業務遂行)'], ['Specialty','(専門・顧客)'], ['Innovation','(企画・変革)'], ['Management','(計画・組織)'], ['Leadership','(統率・決断)']],
              datasets: [{
                data: [pctScores.B, pctScores.E, pctScores.S, pctScores.I, pctScores.M, pctScores.L],
                backgroundColor: radarColor.bg, borderColor: radarColor.border, borderWidth: 2,
                pointBackgroundColor: radarColor.point, pointBorderColor: '#fff', pointRadius: 4, fill: true
              }]
            },
            options: {
              animation: false, responsive: true, maintainAspectRatio: false, 
              layout: { padding: { top: 10, bottom: 20, left: 15, right: 15 } },
              scales: { 
                r: { 
                  min: 0, max: 100, ticks: { display: false, stepSize: 20 }, 
                  grid: { color: 'rgba(0, 0, 0, 0.1)' },
                  angleLines: { color: 'rgba(0, 0, 0, 0.1)' },
                  pointLabels: { font: { size: 10, weight: 'bold' }, color: '#334155' } 
                } 
              },
              plugins: { legend: { display: false } }
            }
          });
        }

        const ctxBar = document.getElementById('barChart');
        if (ctxBar) {
          const labels = gradeMatches.map(m => m.id);
          const data = gradeMatches.map(m => m.matchPct);
          const bgColors = gradeMatches.map(m => m.type === 'G' ? 'rgba(245, 158, 11, 0.85)' : 'rgba(139, 92, 246, 0.85)');

          new Chart(ctxBar.getContext('2d'), {
            type: 'bar',
            data: {
              labels: labels,
              datasets: [{ 
                data: data, 
                backgroundColor: bgColors, 
                borderRadius: 3,
                barPercentage: 0.7,
                categoryPercentage: 0.85
              }]
            },
            options: {
              animation: false, responsive: true, maintainAspectRatio: false,
              layout: { padding: { top: 10, bottom: 15, left: 10, right: 10 } },
              scales: {
                y: { 
                  min: 0, max: 100, ticks: { stepSize: 50, font: {size: 10} },
                  grid: { color: 'rgba(0, 0, 0, 0.05)' } 
                },
                x: { 
                  ticks: { font: { size: 10, weight: 'bold' }, color: '#334155' },
                  grid: { display: false }
                }
              },
              plugins: { 
                legend: { display: false },
                tooltip: { callbacks: { label: (c) => `到達率: ${c.raw}%` } }
              }
            }
          });
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const app = new CompetencyAnalyzer('app');
      app.init();
    });
  </script>
</body>
</html>
